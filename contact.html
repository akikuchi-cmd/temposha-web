    <div class="page-header">
        <h1 class="page-title">CONTACT</h1>
    </div>

    <div class="message-body-container" style="max-width: 700px;">
        <p style="text-align: center; margin-bottom: 60px;">お見積もりや工事のご相談は、<br>下記フォームよりお気軽にお問い合わせください。</p>

        <form action="https://formspree.io/f/mqkrqrzr" method="POST"
            style="background: #fdfdfd; padding: 40px; border: 1px solid #eee;">
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 10px;">お名前</label>
                <input type="text" name="name" required style="width: 100%; padding: 15px; border: 1px solid #ccc;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 10px;">メールアドレス</label>
                <input type="email" name="email" required style="width: 100%; padding: 15px; border: 1px solid #ccc;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 10px;">お問い合わせ内容</label>
                <textarea name="message" rows="6" required
                    style="width: 100%; padding: 15px; border: 1px solid #ccc;"></textarea>
            </div>
            <button type="submit"
                style="display: block; width: 200px; margin: 0 auto; padding: 15px; background: #333; color: #fff; border: none; cursor: pointer;">送信する</button>
        </form>
    </div>
